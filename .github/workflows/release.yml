name: Release

on:
  push:
    tags: ['v*']

jobs:
  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Configure
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release -DCMAKE_OSX_ARCHITECTURES="arm64;x86_64" -DCMAKE_OSX_DEPLOYMENT_TARGET=13.0

      - name: Build
        run: cmake --build build --config Release

      - name: Import certificate
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          echo "$APPLE_CERTIFICATE" | base64 --decode > cert.p12
          security create-keychain -p actions build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p actions build.keychain
          security import cert.p12 -k build.keychain -P "$APPLE_CERTIFICATE_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k actions build.keychain
          rm cert.p12

      - name: Sign plugins
        run: |
          ARTS=build/KR106_artefacts
          if [ -d "$ARTS/Release/VST3" ]; then ARTS="$ARTS/Release"; fi
          IDENTITY="Developer ID Application"
          codesign --force --deep --options runtime --sign "$IDENTITY" "$ARTS/AU/KR106.component"
          codesign --force --deep --options runtime --sign "$IDENTITY" "$ARTS/VST3/KR106.vst3"
          codesign --force --deep --options runtime --sign "$IDENTITY" "$ARTS/Standalone/KR106.app"

      - name: Notarize plugins
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
        run: |
          ARTS=build/KR106_artefacts
          if [ -d "$ARTS/Release/VST3" ]; then ARTS="$ARTS/Release"; fi
          # Create a zip for notarization submission
          ditto -c -k --keepParent "$ARTS/AU/KR106.component" notarize-au.zip
          ditto -c -k --keepParent "$ARTS/VST3/KR106.vst3" notarize-vst3.zip
          ditto -c -k --keepParent "$ARTS/Standalone/KR106.app" notarize-app.zip
          # Submit each for notarization and wait
          xcrun notarytool submit notarize-au.zip --apple-id "$APPLE_ID" --team-id "$APPLE_TEAM_ID" --password "$APPLE_APP_PASSWORD" --wait
          xcrun notarytool submit notarize-vst3.zip --apple-id "$APPLE_ID" --team-id "$APPLE_TEAM_ID" --password "$APPLE_APP_PASSWORD" --wait
          xcrun notarytool submit notarize-app.zip --apple-id "$APPLE_ID" --team-id "$APPLE_TEAM_ID" --password "$APPLE_APP_PASSWORD" --wait
          # Staple the notarization tickets
          xcrun stapler staple "$ARTS/AU/KR106.component"
          xcrun stapler staple "$ARTS/VST3/KR106.vst3"
          xcrun stapler staple "$ARTS/Standalone/KR106.app"

      - name: Package
        run: |
          mkdir -p pkg
          ARTS=build/KR106_artefacts
          if [ -d "$ARTS/Release/VST3" ]; then ARTS="$ARTS/Release"; fi
          cp -R "$ARTS/AU/KR106.component" pkg/
          cp -R "$ARTS/VST3/KR106.vst3" pkg/
          cp -R "$ARTS/Standalone/KR106.app" pkg/
          cat > pkg/INSTALL.txt << 'EOF'
          Ultramaster KR-106 — macOS Installation

          Copy each item to the correct location:

             KR106.component  →  ~/Library/Audio/Plug-Ins/Components/
             KR106.vst3        →  ~/Library/Audio/Plug-Ins/VST3/
             KR106.app         →  /Applications/ (or anywhere you like)

          The .component file is the AU (Audio Unit) plugin for Logic Pro,
          GarageBand, and other AU-compatible hosts.

          After copying, restart your DAW to scan for new plugins.
          EOF
          cd pkg && zip -r ../KR106-macOS.zip .

      - uses: actions/upload-artifact@v4
        with:
          name: KR106-macOS
          path: KR106-macOS.zip

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Configure
        run: cmake -B build -DCMAKE_MSVC_RUNTIME_LIBRARY=MultiThreaded

      - name: Build
        run: cmake --build build --config Release

      - name: Package
        shell: bash
        run: |
          mkdir -p pkg
          ARTS=build/KR106_artefacts
          if [ -d "$ARTS/Release/VST3" ]; then ARTS="$ARTS/Release"; fi
          cp -R "$ARTS/VST3/KR106.vst3" pkg/
          cp -R "$ARTS/Standalone/KR106.exe" pkg/
          cat > pkg/INSTALL.txt << 'EOF'
          Ultramaster KR-106 — Windows Installation

          VST3:       Copy the KR106.vst3 folder to C:\Program Files\Common Files\VST3\
          Standalone: Put KR106.exe anywhere you like.

          After copying, restart your DAW to scan for new plugins.
          EOF
          cd pkg && 7z a ../KR106-Windows.zip .

      - uses: actions/upload-artifact@v4
        with:
          name: KR106-Windows
          path: KR106-Windows.zip

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libasound2-dev \
            libx11-dev libxrandr-dev libxinerama-dev libxcursor-dev \
            libfreetype-dev \
            libwebkit2gtk-4.1-dev \
            mesa-common-dev libgl-dev

      - name: Configure
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build --config Release

      - name: Package
        run: |
          mkdir -p pkg
          ARTS=build/KR106_artefacts
          if [ -d "$ARTS/Release/VST3" ]; then ARTS="$ARTS/Release"; fi
          cp -R "$ARTS/VST3/KR106.vst3" pkg/
          cp -R "$ARTS/LV2/KR106.lv2" pkg/
          cp -R "$ARTS/Standalone/KR106" pkg/
          cat > pkg/INSTALL.txt << 'EOF'
          Ultramaster KR-106 — Linux Installation

          VST3:       Copy the KR106.vst3 folder to ~/.vst3/
          LV2:        Copy the KR106.lv2 folder to ~/.lv2/
          Standalone: Put KR106 anywhere on your PATH.

          After copying, restart your DAW to scan for new plugins.
          EOF
          cd pkg && zip -r ../KR106-Linux.zip .

      - uses: actions/upload-artifact@v4
        with:
          name: KR106-Linux
          path: KR106-Linux.zip

  release:
    needs: [build-macos, build-windows, build-linux]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/KR106-macOS/KR106-macOS.zip
            artifacts/KR106-Windows/KR106-Windows.zip
            artifacts/KR106-Linux/KR106-Linux.zip
          generate_release_notes: true
