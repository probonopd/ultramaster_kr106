name: Bug Report
description: Report a bug or crash
labels: [bug]
body:
  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: Describe the bug. What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: How can we reproduce this?
      placeholder: |
        1. Load KR106 in ...
        2. Select preset ...
        3. Play note ...
    validations:
      required: true

  - type: dropdown
    id: format
    attributes:
      label: Plugin format
      options:
        - AU
        - VST3
        - LV2
        - Standalone
    validations:
      required: true

  - type: input
    id: daw
    attributes:
      label: DAW and version
      placeholder: e.g. Reaper 7.x, Logic Pro 11, Ableton 12

  - type: dropdown
    id: os
    attributes:
      label: Operating system
      options:
        - macOS
        - Windows
        - Linux
    validations:
      required: true

  - type: input
    id: os_version
    attributes:
      label: OS version
      placeholder: e.g. macOS 14.4, Windows 11 23H2, Ubuntu 24.04

  - type: input
    id: kr106_version
    attributes:
      label: KR106 version
      placeholder: e.g. v2.0.1
